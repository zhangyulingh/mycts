# 明业搅拌条码系统 — 新增 Nginx 站点（不影响现有 MySQL 项目）
# 用法：复制到 /etc/nginx/conf.d/mycts.conf 后修改 server_name 和 root

server {
    listen 80;
    # 建议用子域名，例如 mycts.你的公司域名.com
    # 若暂时只有 IP，可写：server_name 118.31.121.169;
    server_name mycts.example.com;

    root /var/www/mycts/dist;
    index index.html;

    # Vue Hash 路由：所有页面回落到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反代到本机 Node（与 MySQL 项目互不影响）
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存（可选）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
